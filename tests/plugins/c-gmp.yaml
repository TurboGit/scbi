name: c-gmp
hooks:
  vcs: "default none mercurial https://gmplib.org/repo/gmp/"
  archive: "default none curl https://gmplib.org/download/gmp gmp-$VERSION.tar.xz"
  out-of-tree: false
  build-depends:
    - c-sandbox
  env:
    - add-to-var C_INCLUDE_PATH $PREFIX/include
    - add-to-var LD_LIBRARY_PATH $PREFIX/lib
  config:
    - ./configure --prefix=$PREFIX
  build:
    - make -j$JOBS
  install:
    - make install
  cross-config:
    - ./configure --prefix=$PREFIX/$TARGET --build=$SCBI_HOST --host=$TARGET
  vcs-pre-config:
    - ./.bootstrap
    - true
